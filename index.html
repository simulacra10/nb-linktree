<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minimally Centered </title>
    <style>
     :root {
       --max-width: 720px;
       --side-padding: 1.25rem;
       --text-color: #D6D6D6;
       --bg-color: #111;
       --muted-color: #666;
       --line-height: 1.6;
     }

     * {
       box-sizing: border-box;
     }

     html {
       font-size: 16px;
     }

     body {
       margin: 0;
       min-height: 100vh;
       font-family: system-ui, sans-serif;
       line-height: var(--line-height);
       color: var(--text-color);
       background: var(--bg-color);
     }

     .page {
       width: 100%;
       max-width: var(--max-width);
       margin: 0 auto;
       padding: 3rem var(--side-padding);
     }

     h1, h2, h3 {
       line-height: 1.2;
       margin-top: 0;
     }

     p {
       margin: 0 0 1rem;
     }

     .muted {
       color: var(--muted-color);
     }

     @media (max-width: 600px) {
       .page {
         padding-top: 2rem;
         padding-bottom: 2rem;
       }
     }
     .web1-buttons {
  display: flex;
  gap: 0;
  flex-wrap: wrap;
}

.web1-buttons a {
  display: block;
  line-height: 0;
  margin: 0;
  padding: 0;
}

.web1-buttons img {
  display: block;
  margin: 0;
  padding: 0;
  border: 0;
}
    </style>
  </head>
  <body>
    <main class="page">
      <h1>Norman Bauer</h1>
      <h2 Digital minimialist </h2

      <section class="digital-minimalism-rules">
	<h2>In Digital Minimalism, the first three rules are:</h2>
	<ol>
	  <li>The content comes first.</li>
	  <li>The content comes first.</li>
	  <li>The workflow serves the work, not the other way around.</li>
	</ol>

	<p><strong>Less software. More substance.</strong></p>
      </section>
      <section>
	<div class="web1-buttons">
	  <a href="https://github.com/simulacra10" target="_blank" rel="noopener noreferrer">
	    <img src="./github.png" alt="My Github" width="88" height="31">
	  </a>

	  <a href="https://captaincontrary.com" target="_blank" rel="noopener noreferrer">
	    <img src="./substack.png" alt="My Substack" width="88" height="31">
	  </a>

	  <a href="https://x.com/simulacra10" target="_blank" rel="noopener noreferrer">
	    <img src="./x.png" alt="My X" width="88" height="31">
	  </a>
	</div>
      </section>
      <br>
      <pre>
Plain text on the screen
Nothing wasted, nothing dressed
Only thought remains
      </pre>
      </br>
    </main>
  </body>
</html>
